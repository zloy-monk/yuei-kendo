<!-- HERO -->
<section
  class="relative flex items-center justify-center min-h-[65vh] bg-[url('assets/img/about-hero.gif')] bg-cover bg-center bg-no-repeat"
>
  <div class="absolute inset-0 bg-black/60"></div>
  <div class="relative z-10 text-center px-4">
    <h1 class="text-4xl md:text-6xl font-bold text-white uppercase tracking-wide mb-3">
      {{ translate.t('about.title') }}
    </h1>
    <div class="w-16 h-1 bg-primary mx-auto"></div>
  </div>
</section>

<!-- ИСТОРИЯ КЛУБА -->
<section class="bg-dark text-white py-20">
  <div class="container mx-auto px-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
      <!-- Текст -->
      <div class="flex flex-col gap-5">
        <h2 class="text-2xl md:text-3xl font-bold leading-snug">
          {{ translate.t('about.story_title_pre') }}<span class="text-primary">Yuei</span
          >{{ translate.t('about.story_title_post') }}
        </h2>
        <p class="text-white/70 leading-relaxed">
          {{ translate.t('about.story_p1') }}
        </p>
        <p class="text-white/70 leading-relaxed">
          {{ translate.t('about.story_p2') }}
        </p>
      </div>

      <!-- Фото -->
      <div class="rounded-2xl overflow-hidden aspect-[4/3]">
        <img
          src="assets/img/about-team.jpg"
          alt="Yuei Kendo team"
          class="w-full h-full object-cover"
        />
      </div>
    </div>
  </div>
</section>

<!-- ГАЛЕРЕЯ -->
<section class="relative overflow-hidden bg-surface bg-logo-pattern py-20">
  <div class="relative z-10 container mx-auto px-6">
    <h2 class="text-2xl md:text-3xl font-bold text-white text-center mb-10">
      {{ translate.t('about.gallery_title') }}
    </h2>
    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
      @for (img of gallery; track img) {
        <div class="aspect-square rounded-xl overflow-hidden">
          <img
            [src]="img"
            alt="Yuei Kendo"
            class="w-full h-full object-cover hover:scale-105 transition-transform duration-500"
          />
        </div>
      }
    </div>
  </div>
</section>
