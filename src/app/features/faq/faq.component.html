<!-- HERO -->
<section
  class="relative flex items-center justify-center min-h-[65vh] bg-[url('assets/img/about-hero.gif')] bg-cover bg-center bg-no-repeat"
>
  <div class="absolute inset-0 bg-black/65"></div>
  <div class="relative z-10 text-center px-4">
    <h1 class="text-4xl md:text-6xl font-bold text-white uppercase tracking-wide mb-3">
      {{ translate.t('faq.title') }}
    </h1>
    <div class="w-16 h-1 bg-primary mx-auto"></div>
  </div>
</section>

<!-- ACCORDION -->
<section class="bg-dark text-white py-20">
  <div class="container mx-auto px-6 max-w-3xl">
    <app-faq-accordion [items]="items" />
  </div>
</section>

<!-- CTA: сомнения сняты — записывайся (переиспользуем ключи секции ПРОБНОЕ с главной) -->
<section class="relative overflow-hidden bg-surface bg-logo-pattern py-16">
  <div class="relative z-10 container mx-auto px-6 max-w-xl text-center">
    <h2 class="text-2xl md:text-3xl font-bold text-white mb-3">
      {{ translate.t('home.trial_title') }}
    </h2>
    <p class="text-white/70 leading-relaxed mb-8">
      {{ translate.t('home.trial_text') }}
    </p>
    <a
      [href]="formUrl"
      target="_blank"
      rel="noopener noreferrer"
      class="inline-block px-8 py-3.5 text-base rounded-full bg-primary text-white font-semibold tracking-wide transition-opacity hover:opacity-90 md:text-lg"
    >
      {{ translate.t('home.trial_cta') }}
    </a>
  </div>
</section>
