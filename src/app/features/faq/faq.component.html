<!-- HERO -->
<section class="relative flex items-center justify-center min-h-[65vh] overflow-hidden">
  <!-- Видео-фон: muted обязателен для autoplay, playsinline — для iOS,
       poster — кадр-заглушка пока видео грузится -->
  <video
    class="absolute inset-0 w-full h-full object-cover"
    src="assets/img/hero.mp4"
    poster="assets/img/hero.avif"
    preload="metadata"
    autoplay
    muted
    loop
    playsinline
  ></video>
  <div class="absolute inset-0 bg-black/65"></div>
  <div class="relative z-10 text-center px-4">
    <h1 class="text-4xl md:text-6xl font-bold text-white uppercase tracking-wide mb-3">
      {{ translate.t('faq.title') }}
    </h1>
    <div class="w-16 h-1 bg-primary mx-auto"></div>
  </div>
</section>

<!-- ACCORDION -->
<section class="bg-dark text-white py-20">
  <div class="w-full max-w-7xl mx-auto px-6 max-w-3xl">
    <app-faq-accordion [items]="items" />
  </div>
</section>
