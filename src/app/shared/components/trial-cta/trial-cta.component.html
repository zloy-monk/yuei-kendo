<!-- ПРОБНОЕ — CTA на запись -->
<section class="relative overflow-hidden bg-surface bg-logo-pattern py-16">
  <div appReveal class="relative z-10 container mx-auto px-6 max-w-xl text-center">
    <h2 class="float-text-shadow text-2xl md:text-3xl font-bold text-white mb-3">
      {{ translate.t('home.trial_title') }}
    </h2>
    <p class="float-text-shadow text-white/70 leading-relaxed mb-8">
      {{ translate.t('home.trial_text') }}
    </p>
    <a
      [href]="formUrl"
      target="_blank"
      rel="noopener noreferrer"
      class="float-shadow inline-block px-8 py-3.5 text-base rounded-full bg-primary text-white font-semibold tracking-wide transition-opacity hover:opacity-90 md:text-lg"
    >
      {{ translate.t('home.trial_cta') }}
    </a>
  </div>
</section>
